<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular background -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#C4A747" stroke-width="12"/>
  
  <!-- VW Monogram -->
  <g>
    <!-- V -->
    <path d="M 70 60 L 85 110 L 100 60 L 115 110 L 130 60" fill="none" stroke="#1a4d3a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- W -->
    <path d="M 70 130 L 80 160 L 90 135 L 100 160 L 110 135 L 120 160 L 130 130" fill="none" stroke="#C4A747" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Decorative line and flourish -->
  <line x1="50" y1="125" x2="70" y2="125" stroke="#C4A747" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="125" x2="150" y2="125" stroke="#C4A747" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Center flourish -->
  <path d="M 95 120 Q 100 125 105 120" fill="none" stroke="#C4A747" stroke-width="2" stroke-linecap="round"/>
</svg>